name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run basic lint check
        run: |
          echo "Running lint check..."
          test -f container-fundamentals/Dockerfile && echo "Dockerfile found ✅" || exit 1
          test -f container-fundamentals/index.html && echo "index.html found ✅" || exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t rayversecloud/hello-world-app:latest \
          -t rayversecloud/hello-world-app:${{ github.sha }} \
          ./container-fundamentals

      - name: Push both tags to Docker Hub
        run: |
          docker push rayversecloud/hello-world-app:latest
          docker push rayversecloud/hello-world-app:${{ github.sha }}